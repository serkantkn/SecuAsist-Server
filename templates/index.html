<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuAsist | Yönetim Paneli</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #030712;
            --bg-secondary: #0f172a;
            --bg-card: rgba(15, 23, 42, 0.6);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-violet: #8b5cf6;
            --border: rgba(148, 163, 184, 0.08);
        }
        body { 
            font-family: 'Inter', sans-serif; transition: background-color 0.4s ease; min-height: 100vh; 
            background: var(--bg-primary); color: var(--text-primary);
        }
        
        /* --- AMBIENT BACKGROUND --- */
        .ambient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .ambient .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12;
            animation: float 20s ease-in-out infinite;
        }
        .ambient .orb:nth-child(1) { width: 600px; height: 600px; background: var(--accent-blue); top: -200px; left: -100px; animation-delay: 0s; }
        .ambient .orb:nth-child(2) { width: 500px; height: 500px; background: var(--accent-violet); top: 40%; right: -150px; animation-delay: -7s; }
        .ambient .orb:nth-child(3) { width: 400px; height: 400px; background: var(--accent-cyan); bottom: -100px; left: 30%; animation-delay: -14s; }
        
        .light .ambient .orb { opacity: 0.07; filter: blur(100px); }
        .light body { background: #f8fafc; color: #1e293b; }
        .light .ambient .orb:nth-child(1) { background: #3b82f6; }
        .light .ambient .orb:nth-child(2) { background: #f97316; }
        .light .ambient .orb:nth-child(3) { background: #06b6d4; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .glass { 
            background: var(--bg-card); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2); 
            transition: all 0.4s ease;
        }
        .glass:hover { transform: translateY(-2px); border-color: rgba(59, 130, 246, 0.2); }
        .light .glass {
            background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        .sidebar-item-active { background: linear-gradient(90deg, rgba(59,130,246,0.1) 0%, transparent 100%); border-left: 4px solid var(--accent-blue); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .grad-text {
            background: linear-gradient(135deg, #f1f5f9 0%, #3b82f6 50%, #06b6d4 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .light .grad-text {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 50%, #f97316 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>

</head>
<body class="overflow-hidden  text-slate-800 dark: dark:text-slate-200">
    <div class="ambient"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SHARED UI COMPONENTS ---

        const Modal = ({ title, isOpen, onClose, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in">
                    <div className="glass w-full max-w-2xl rounded-2xl overflow-hidden shadow-2xl border border-slate-700 flex flex-col max-h-[90vh]">
                        <div className="px-6 py-4 border-b border-slate-700 flex justify-between items-center shrink-0">
                            <h3 className="text-lg font-semibold">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl">&times;</button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const Input = ({ label, value, onChange, type = "text", placeholder = "" }) => (
            <div className="space-y-1">
                {label && <label className="text-xs font-medium text-slate-400 uppercase tracking-wider">{label}</label>}
                <input 
                    type={type} 
                    value={value || ''} 
                    onChange={e => onChange(e.target.value)}
                    placeholder={placeholder}
                    className="w-full bg-white/50 dark:bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors"
                />
            </div>
        );

        const Toggle = ({ label, value, onChange }) => (
            <div className="flex items-center justify-between p-3 glass rounded-lg">
                <span className="text-sm font-medium">{label}</span>
                <button 
                    onClick={() => (onChange ? onChange(value === 1 ? 0 : 1) : null)}
                    className={`w-10 h-5 rounded-full relative transition-colors ${value === 1 ? 'bg-blue-600' : 'bg-slate-700'} ${!onChange ? 'opacity-50 cursor-default' : ''}`}
                >
                    <div className={`absolute top-1 w-3 h-3 rounded-full bg-white transition-all ${value === 1 ? 'left-6' : 'left-1'}`}></div>
                </button>
            </div>
        );

        // --- KURULUM SİHİRBAZI ---

        const SetupWizard = ({ onComplete }) => {
            const [step, setStep] = useState(1);
            const [projectType, setProjectType] = useState(null);
            const [siteName, setSiteName] = useState('');
            const [loading, setLoading] = useState(false);

            const projectOptions = [
                { id: 'VILLA', label: 'Villa Sitesi', icon: '🏡', desc: 'Villalardan oluşan konut siteleri için', color: 'emerald' },
                { id: 'BLOCK', label: 'Blok Sitesi', icon: '🏢', desc: 'Blok, kat ve dairelerden oluşan siteler için', color: 'blue' },
                { id: 'MALL', label: 'AVM / İş Merkezi', icon: '🏬', desc: 'Mağaza ve ofislerden oluşan ticari yapılar için', color: 'violet' },
            ];

            const handleFinish = async () => {
                if (!projectType || !siteName.trim()) { globalShowToast('Lütfen tüm alanları doldurun.', 'error'); return; }
                setLoading(true);
                try {
                    const res = await fetch('/api/v1/setup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ project_type: projectType, site_name: siteName.trim() })
                    });
                    if (res.ok) {
                        const config = await res.json();
                        globalShowToast('Kurulum başarıyla tamamlandı!', 'success');
                        onComplete(config);
                    } else {
                        globalShowToast('Kurulum sırasında bir hata oluştu.', 'error');
                    }
                } catch (e) { globalShowToast('Sunucuya ulaşılamadı.', 'error'); }
                setLoading(false);
            };

            return (
                <div className="flex items-center justify-center h-screen w-screen animate-fade-in">
                    <div className="glass rounded-3xl p-10 max-w-2xl w-full mx-4 shadow-2xl border border-slate-700/50">
                        {/* Header */}
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black grad-text mb-3">SecuAsist</h1>
                            <p className="text-slate-400 text-sm">Güvenlik Yönetim Platformunu Yapılandırın</p>
                            <div className="flex justify-center mt-6 space-x-3">
                                <div className={`w-10 h-1.5 rounded-full transition-all ${step >= 1 ? 'bg-blue-500' : 'bg-slate-700'}`}></div>
                                <div className={`w-10 h-1.5 rounded-full transition-all ${step >= 2 ? 'bg-blue-500' : 'bg-slate-700'}`}></div>
                            </div>
                        </div>

                        {/* Adım 1: Proje Tipi */}
                        {step === 1 && (
                            <div className="animate-fade-in">
                                <h2 className="text-lg font-bold mb-1">Yönetim Alanı Seçin</h2>
                                <p className="text-slate-500 text-xs mb-6">SecuAsist hangi tür yapıda kullanılacak?</p>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {projectOptions.map(opt => (
                                        <button key={opt.id} onClick={() => setProjectType(opt.id)}
                                            className={`p-6 rounded-2xl text-left transition-all border-2 hover:scale-[1.02] ${
                                                projectType === opt.id 
                                                    ? `border-${opt.color}-500 bg-${opt.color}-500/10 shadow-lg shadow-${opt.color}-500/10` 
                                                    : 'border-slate-700/50 hover:border-slate-600 bg-slate-800/30'
                                            }`}
                                        >
                                            <div className="text-3xl mb-3">{opt.icon}</div>
                                            <div className="font-bold text-sm">{opt.label}</div>
                                            <div className="text-[11px] text-slate-400 mt-1 leading-relaxed">{opt.desc}</div>
                                        </button>
                                    ))}
                                </div>
                                <div className="flex justify-end mt-8">
                                    <button onClick={() => { if (projectType) setStep(2); else globalShowToast('Lütfen bir alan seçin.', 'error'); }}
                                        className="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-500/20"
                                    >Devam →</button>
                                </div>
                            </div>
                        )}

                        {/* Adım 2: Site Adı */}
                        {step === 2 && (
                            <div className="animate-fade-in">
                                <h2 className="text-lg font-bold mb-1">Site / Tesis Bilgileri</h2>
                                <p className="text-slate-500 text-xs mb-6">Bu bilgi panelde ve raporlarda görünecektir.</p>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-medium text-slate-400 uppercase tracking-wider block mb-1">Site Adı</label>
                                        <input type="text" value={siteName} onChange={e => setSiteName(e.target.value)}
                                            placeholder="Örn: Güneşpark Villaları, Maviş AVM"
                                            className="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors"
                                        />
                                    </div>
                                    <div className="glass rounded-xl p-4 mt-4">
                                        <div className="text-xs text-slate-500 uppercase tracking-wider mb-2">Seçilen Mod</div>
                                        <div className="flex items-center">
                                            <span className="text-2xl mr-3">{projectOptions.find(o => o.id === projectType)?.icon}</span>
                                            <span className="font-bold">{projectOptions.find(o => o.id === projectType)?.label}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-between mt-8">
                                    <button onClick={() => setStep(1)}
                                        className="px-6 py-3 text-slate-400 hover:text-white text-sm font-bold transition-all"
                                    >← Geri</button>
                                    <button onClick={handleFinish} disabled={loading}
                                        className="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold text-sm transition-all shadow-lg shadow-emerald-500/20 disabled:opacity-50"
                                    >{loading ? 'Kuruluyor...' : '✓ Kurulumu Tamamla'}</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- PAGE COMPONENTS ---

        const Sidebar = ({ activeTab, setActiveTab, config }) => {
            const allItems = [
                { id: 'dashboard', label: 'Panel', icon: '📊', module: null },
                { id: 'villas', label: config?.unit_label_plural || 'Villalar', icon: config?.project_type === 'MALL' ? '🏬' : config?.project_type === 'BLOCK' ? '🏢' : '🏡', module: 'units' },
                { id: 'contacts', label: 'Kişiler', icon: '👥', module: 'contacts' },
                { id: 'cargos', label: 'Kargolar', icon: '📦', module: 'cargos' },
                { id: 'faults', label: 'Arızalar', icon: '🛠️', module: 'cameras' },
                { id: 'logs', label: 'Sistem Logları', icon: '📜', module: null },
                { id: 'settings', label: 'Ayarlar', icon: '⚙️', module: null },
            ];

            const modules = config?.modules || ['units', 'contacts', 'cargos', 'cameras', 'intercoms'];
            const items = allItems.filter(item => item.module === null || modules.includes(item.module));

            return (
                <div className="w-64 h-screen glass border-r border-slate-800/60 flex flex-col shrink-0">
                    <div className="p-6">
                        <h1 className="text-xl font-bold grad-text text-2xl tracking-tight italic">{config?.site_name || 'SecuAsist'}</h1>
                        <p className="text-[10px] text-slate-500 dark:text-slate-400 mt-1 uppercase tracking-widest font-semibold flex items-center">
                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-2 animate-pulse"></span>
                            {config?.label || 'Yönetim Merkezi'}
                        </p>
                    </div>
                    <nav className="flex-1 mt-4">
                        {items.map(item => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center px-6 py-4 text-sm transition-all ${activeTab === item.id ? 'sidebar-item-active text-blue-600 dark:text-blue-400 font-bold' : 'text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200 hover:bg-black/5 dark:hover:bg-white/5'}`}
                            >
                                <span className="mr-3 text-lg">{item.icon}</span>
                                {item.label}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const VillaPage = ({ villas, contacts, onUpdate }) => {
            const [search, setSearch] = useState('');
            const [editingVilla, setEditingVilla] = useState(null);
            const [viewingVilla, setViewingVilla] = useState(null);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);

            const filteredVillas = (villas || []).filter(v => 
                v.villaNo?.toString().includes(search) || 
                v.villaStreet?.toLowerCase().includes(search.toLowerCase())
            );

            const handleSave = async () => {
                if (!editingVilla.villaNo) { globalShowToast("Villa No zorunludur!", "error"); return; }
                try {
                    const data = { ...editingVilla, updatedAt: Date.now() };
                    const res = await fetch('/api/v1/villas', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (res.ok) { onUpdate(); setEditingVilla(null); }
                    else { const err = await res.json(); globalShowToast("Hata: " + JSON.stringify(err.detail), "error"); }
                } catch (e) { globalShowToast("Bağlantı hatası: " + e.message, "error"); }
            };

            const villaContacts = useMemo(() => {
                const target = viewingVilla || editingVilla;
                if (!target || !target.villaId) return [];
                return (contacts || []).filter(c => c.villaId === target.villaId);
            }, [viewingVilla, editingVilla, contacts]);

            const availableContacts = useMemo(() => {
                if (!editingVilla || !editingVilla.villaId) return [];
                return (contacts || []).filter(c => c.villaId !== editingVilla.villaId);
            }, [editingVilla, contacts]);

            const updateContactVilla = async (contact, newVillaId) => {
                if (!contact || !contact.contactId) {
                    console.error("Invalid contact for update:", contact);
                    return;
                }
                try {
                    const res = await fetch('/api/v1/contacts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...contact, villaId: newVillaId, updatedAt: Date.now() })
                    });
                    if(res.ok) {
                        console.log(`Contact ${contact.contactId} updated with villa ${newVillaId}`);
                        onUpdate();
                    } else {
                        const err = await res.json();
                        console.error("API Error updating contact:", err);
                    }
                } catch (e) { console.error("Network Error updating contact:", e); }
            };

            const renderVillaStatuses = (villa) => {
                const statuses = [
                    { label: "Sadece Cep", value: villa.isCallOnlyMobile, color: "rose", icon: "📱" },
                    { label: "Kiralık", value: villa.isVillaRental, color: "purple", icon: "🔑" },
                    { label: "Boş", value: villa.isVillaEmpty, color: "rose", icon: "🏠" },
                    { label: "Şantiye", value: villa.isVillaUnderConstruction, color: "amber", icon: "🔨" },
                    { label: "Evden Aransın", value: villa.isVillaCallFromHome, color: "emerald", icon: "📞" },
                    { label: "Kargo Red", value: villa.isVillaCallForCargo === 0 ? 1 : 0, color: "rose", icon: "📦" },
                    { label: "VIP / ÖZEL", value: villa.isVillaSpecial, color: "amber", icon: "⭐" }
                ].filter(s => s.value === 1);

                if (statuses.length === 0) return <p className="text-slate-500 italic text-xs">Aktif özellik bulunmuyor.</p>;

                return (
                    <div className="flex flex-wrap gap-2">
                        {statuses.map(s => (
                            <span key={s.label} title={s.label} className={`px-3 py-1 rounded-full bg-${s.color}-500/10 text-${s.color}-400 border border-${s.color}-500/20 text-[10px] font-bold flex items-center gap-1.5`}>
                                <span>{s.icon}</span>
                                <span className="uppercase tracking-wider">{s.label}</span>
                            </span>
                        ))}
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full animate-fade-in">
                    <div className="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-xl px-8 py-4 border-b border-slate-800/40 flex justify-between items-center shrink-0">
                        <div className="shrink-0 mr-8">
                            <h2 className="text-2xl font-bold">Villalar</h2>
                            <p className="text-slate-400 text-[10px] mt-1 font-mono uppercase tracking-widest">{villas.length} kayıtlı villa</p>
                        </div>
                        <div className="flex space-x-4 items-center">
                            <div className="relative">
                                <input 
                                    type="text" 
                                    placeholder="Villa veya sokak ara..." 
                                    className="bg-white/50 dark:bg-slate-800/50 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm w-64 focus:border-blue-500 outline-none"
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <span className="absolute left-3 top-2.5 opacity-40">🔍</span>
                            </div>
                            <label className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all cursor-pointer flex items-center">
                                📤 CSV İçe Aktar
                                <input type="file" className="hidden" accept=".csv" onChange={async (e) => {
                                    const file = e.target.files[0];
                                    if(!file) return;
                                    const formData = new FormData();
                                    formData.append('file', file);
                                    const res = await fetch('/api/v1/import/villas', { method:'POST', body:formData });
                                    if(res.ok) { const data = await res.json(); globalShowToast(`${data.count} villa başarıyla içe aktarıldı.`, "success"); onUpdate(); }
                                    else { globalShowToast("Yükleme hatası!", "error"); }
                                }} />
                            </label>
                            <button onClick={() => setEditingVilla({ villaNo: '', villaStreet: '', deviceId: 'Sunucu' })} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-all">+ Yeni Villa</button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-8 pb-32">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
                            {filteredVillas.map(v => (
                                <div key={v.villaId} onClick={() => setViewingVilla(v)} className="glass p-5 rounded-2xl hover:border-blue-500/40 transition-all group relative overflow-hidden cursor-pointer">
                                    <div className="flex justify-between items-start z-10 relative">
                                        <div className="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center font-bold text-xl text-blue-400 border border-blue-500/20">
                                            {v.villaNo}
                                        </div>
                                        <div className="flex space-x-1">
                                            {confirmDeleteId === v.villaId ? (
                                                <div className="flex items-center space-x-1 animate-fade-in" onClick={e => e.stopPropagation()}>
                                                    <button onClick={async () => { 
                                                        const res = await fetch(`/api/v1/villas/${v.villaId}`, {method:'DELETE'}); 
                                                        if(res.ok) { onUpdate(); setConfirmDeleteId(null); } else globalShowToast("Silme hatası!", "error");
                                                    }} className="p-2 bg-rose-600 text-white rounded-lg text-[10px] font-bold">EVET</button>
                                                    <button onClick={() => setConfirmDeleteId(null)} className="p-2 bg-slate-700 text-white rounded-lg text-[10px] font-bold">İPTAL</button>
                                                </div>
                                            ) : (
                                                <>
                                                    <button onClick={(e) => { e.stopPropagation(); setEditingVilla(v); }} className="p-2 glass rounded-lg hover:text-blue-400 group-hover:opacity-100 transition-opacity">✏️</button>
                                                    <button onClick={(e) => { e.stopPropagation(); setConfirmDeleteId(v.villaId); }} className="p-2 glass rounded-lg hover:text-rose-400 group-hover:opacity-100 transition-opacity z-20">🗑️</button>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    <div className="mt-4 z-10 relative">
                                        <h4 className="font-semibold text-slate-200 truncate">{v.villaStreet || 'İsimsiz Sokak'}</h4>
                                        <p className="text-[10px] text-slate-500 mt-0.5 font-medium truncate uppercase tracking-tighter">Nav A: {v.villaNavigationA || '-'}</p>
                                    </div>
                                    <div className="flex flex-wrap gap-1.5 mt-4 z-10 relative">
                                        {v.isVillaUnderConstruction === 1 && <span title="Şantiye" className="w-6 h-6 rounded-full bg-amber-500/10 flex items-center justify-center text-[10px] border border-amber-500/20">🔨</span>}
                                        {v.isVillaEmpty === 1 && <span title="Boş" className="w-6 h-6 rounded-full bg-rose-500/10 flex items-center justify-center text-[10px] border border-rose-500/20">🏠</span>}
                                        {v.isVillaRental === 1 && <span title="Kiralık" className="w-6 h-6 rounded-full bg-purple-500/10 flex items-center justify-center text-[10px] border border-purple-500/20">🔑</span>}
                                        {v.isVillaSpecial === 1 && <span title="VIP / ÖZEL" className="w-6 h-6 rounded-full bg-amber-500/10 flex items-center justify-center text-[10px] border border-amber-500/20">⭐</span>}

        const LogPage = ({ devices }) => {
            const [logs, setLogs] = useState([]);
            const [filterLevel, setFilterLevel] = useState('ALL');
            const [filterCategory, setFilterCategory] = useState('ALL');
            const [isPaused, setIsPaused] = useState(false);
            const [autoScroll, setAutoScroll] = useState(true);
            const logContainerRef = React.useRef(null);

            useEffect(() => {
                fetch('/api/v1/logs').then(r => r.ok ? r.json() : []).then(data => setLogs(Array.isArray(data) ? data : [])).catch(() => {});
            }, []);

            useEffect(() => {
                const ws = new WebSocket(`ws://${location.host}/ws/WEB_LOGS`);
                ws.onmessage = (e) => {
                    if (isPaused) return;
                    try {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'SYSTEM_LOG' && msg.payload) {
                            setLogs(prev => [...prev, msg.payload].slice(-500));
                        }
                    } catch(err) {}
                };
                return () => ws.close();
            }, [isPaused]);

            useEffect(() => {
                if (autoScroll && logContainerRef.current) {

            const levelColors = {
                'INFO': { bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/20', dot: 'bg-blue-400' },

                'ERROR': { bg: 'bg-rose-500/10', text: 'text-rose-400', border: 'border-rose-500/20', dot: 'bg-rose-400' },

                return true;

            const logCounts = { INFO: logs.filter(l => l.level === 'INFO').length, WARN: logs.filter(l => l.level === 'WARN').length, ERROR: logs.filter(l => l.level === 'ERROR').length, SUCCESS: logs.filter(l => l.level === 'SUCCESS').length };

                                {Object.entries(logCounts).map(([level, count]) => (
                                    <button key={level} onClick={() => setFilterLevel(filterLevel === level ? 'ALL' : level)}
                                        className={`px-2.5 py-1 rounded-lg text-[10px] font-bold border transition-all ${filterLevel === level ? `${levelColors[level].bg} ${levelColors[level].text} ${levelColors[level].border} ring-1 ring-offset-1 ring-offset-slate-950 ring-current` : 'border-slate-800/60 text-slate-500 hover:text-slate-300'}`}
                                    >{level} ({count})</button>
                                ))}
                            </div>
                        </div>
                        <div className="flex items-center justify-between mt-3">
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] text-slate-600 uppercase tracking-widest font-bold mr-1">Kategori:</span>
                                {['ALL', 'CONNECT', 'DISCONNECT', 'SYNC', 'SYSTEM'].map(cat => (
                                    <button key={cat} onClick={() => setFilterCategory(cat)}
                                        className={`px-2.5 py-1 rounded-lg text-[10px] font-bold border transition-all ${filterCategory === cat ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 'border-slate-800/60 text-slate-500 hover:text-slate-300'}`}
                                    >{cat === 'ALL' ? '📋 Tümü' : `${categoryIcons[cat] || '📋'} ${cat}`}</button>
                                ))}
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setAutoScroll(!autoScroll)} className={`px-3 py-1 rounded-lg text-[10px] font-bold border transition-all ${autoScroll ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'border-slate-800/60 text-slate-500'}`}>{autoScroll ? '⬇️ Otomatik Kaydır' : '⏸️ Kaydırma Kapalı'}</button>
                                <button onClick={() => setIsPaused(!isPaused)} className={`px-3 py-1 rounded-lg text-[10px] font-bold border transition-all ${isPaused ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'}`}>{isPaused ? '⏸️ Duraklatıldı' : '▶️ Canlı'}</button>
                                <button onClick={() => setLogs([])} className="px-3 py-1 rounded-lg text-[10px] font-bold border border-slate-800/60 text-slate-500 hover:text-rose-400 hover:border-rose-500/30 transition-all">🗑️ Temizle</button>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-8 pb-32">
                        <section className="mb-8">
                            <h3 className="text-lg font-bold mb-4 flex items-center text-slate-300"><span className="mr-2">📱</span> Bağlı Cihazlar <span className="ml-3 text-xs bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2.5 py-0.5 rounded-full animate-pulse">{devices.length} Online</span></h3>
                            {devices.length > 0 ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {devices.map(d => (
                                        <div key={d.deviceId} className="glass p-4 rounded-xl border-t border-emerald-500/30 hover:bg-slate-800/40 transition-all flex justify-between items-center group">
                                            <div className="flex items-center space-x-3">
                                                <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                                                <div><h5 className="font-semibold text-sm text-slate-200 line-clamp-1">{d.deviceName}</h5><p className="text-[9px] text-slate-500 font-mono tracking-widest uppercase mt-0.5">ID: {d.deviceId.split('_').pop()}</p></div>
                                            </div>
                                            <div className="text-right"><p className="text-[10px] text-emerald-400/80 font-mono"><span className="opacity-0 group-hover:opacity-100 transition-opacity">Bağlandı: </span>{new Date(d.connectedAt * 1000).toLocaleTimeString()}</p></div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="glass p-6 rounded-xl border-t border-rose-500/30 text-center"><p className="text-slate-500 italic text-sm">Şu an aktif bir cihaz bağlantısı bulunmuyor.</p></div>
                            )}
                        </section>
                        
                        <section>
                            <h3 className="text-lg font-bold mb-4 flex items-center text-slate-300"><span className="mr-2">⚡</span> Canlı Sistem Logları <span className="ml-3 text-xs bg-blue-500/20 text-blue-400 border border-blue-500/30 px-2.5 py-0.5 rounded-full">{filteredLogs.length} kayıt</span></h3>
                            <div ref={logContainerRef} className="glass rounded-xl p-1 font-mono text-xs bg-black/60 border-slate-800/60 overflow-y-auto" style={{ height: 'calc(100vh - 520px)', minHeight: '300px' }}>
                                {filteredLogs.map((log, i) => {
                                    const colors = levelColors[log.level] || levelColors['INFO'];
                                    return (
                                        <div key={i} className="py-2 px-3 border-b border-white/[0.03] last:border-0 hover:bg-white/[0.03] transition-colors rounded flex items-start gap-3">
                                            <span className={`shrink-0 w-1.5 h-1.5 rounded-full mt-1.5 ${colors.dot}`}></span>
                                            <span className="text-slate-600 shrink-0 w-16">{formatTs(log.timestamp)}</span>
                                            <span className={`shrink-0 px-1.5 py-0.5 rounded text-[9px] font-black uppercase ${colors.bg} ${colors.text} border ${colors.border} w-16 text-center`}>{log.level}</span>
                                            <span className="shrink-0 text-slate-600 w-6 text-center">{categoryIcons[log.category] || '📋'}</span>
                                            <span className="shrink-0 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase bg-white/50 dark:bg-slate-800/50 text-slate-500 border border-slate-700/50 w-24 text-center">{log.category}</span>
                                            <span className="text-slate-300 flex-1">{log.message}</span>
                                            {log.details && <span className="text-slate-600 text-[10px] shrink-0 max-w-48 truncate" title={JSON.stringify(log.details)}>{JSON.stringify(log.details)}</span>}
                                        </div>
                                    );
                                })}
                                {filteredLogs.length === 0 && <div className="text-slate-600 italic px-4 py-12 text-center text-sm">{logs.length === 0 ? '🔇 Henüz sistem logu bulunmuyor. Cihaz bağlandığında veya veri değiştiğinde loglar burada görünecektir.' : '🔍 Seçili filtrelere uygun log kaydı bulunamadı.'}</div>}
                            </div>
                        </section>
                    </div>
                </div>
            );
        };


        
        const SettingsPage = ({ theme, setTheme }) => {
            const handleExport = () => {
                window.location.href = '/api/v1/server/export';
            };
            const handleImport = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetch('/api/v1/server/import', {method: 'POST', body: formData});
                    if(res.ok) {
                        globalShowToast("Veritabanı yüklendi. Sunucu 2 sn içinde yeniden başlatılacak!", "success");
                        setTimeout(() => window.location.reload(), 3000);
                    } else globalShowToast("Yükleme başarısız!", "error");
                } catch(err) { globalShowToast("Hata!", "error"); }
            };
            const handleRestart = () => {
                globalShowConfirm("Sunucuyu yeniden başlatmak istediğinize emin misiniz? İşlem sırasında anlık kopmalar yaşanabilir.", async () => {
                    try {
                        const res = await fetch('/api/v1/server/restart', {method: 'POST'});
                        if(res.ok) {
                            globalShowToast("Yeniden başlatma komutu gönderildi.", "success");
                            setTimeout(() => window.location.reload(), 3000);
                        }
                    } catch(e) {}
                });
            };
            const handleUpdateCheck = async () => {
                globalShowToast("Güncellemeler denetleniyor, lütfen bekleyin...", "info");
                try {
                    const res = await fetch('/api/v1/server/update/check');
                    const data = await res.json();
                    if(data.status === 'updating') globalShowToast(`Yeni sürüm (v${data.version}) bulunuyor. Lütfen bekleyin.`, "success");
                    else if(data.status === 'up-to-date') globalShowToast("Sistem güncel.", "success");
                    else globalShowToast("Güncelleme hatası: " + data.message, "error");
                } catch(e) {
                    globalShowToast("Sunucuya ulaşılamadı. Yeniden deneyin.", "error");
                }
            };

            return (
                <div className="flex flex-col h-full animate-fade-in">
                    <div className="px-8 py-4 border-b border-slate-800/40 shrink-0   backdrop-blur-xl">
                        <h2 className="text-2xl font-bold dark:text-white text-slate-800">Sistem Ayarları</h2>
                        <p className="text-slate-500 text-[10px] mt-1 font-mono uppercase tracking-widest">Tema, Yedekleme ve Sunucu Kontrolü</p>
                    </div>
                    <div className="flex-1 overflow-y-auto p-8 space-y-8 pb-32">
                        <section className="glass p-6 rounded-2xl">
                            <h3 className="text-lg font-bold mb-4 flex items-center"><span className="mr-3">🎨</span> Cihaz Teması</h3>
                            <div className="flex items-center space-x-4">
                                <button onClick={() => {setTheme('light'); localStorage.setItem('theme','light');}} className={`px-6 py-2 rounded-xl text-sm font-bold border transition-all ${theme === 'light' ? 'bg-blue-500 text-white border-blue-500 shadow-lg shadow-blue-500/30' : 'glass hover:bg-black/5 dark:hover:bg-white/5 border-transparent'}`}>Aydınlık (Light)</button>
                                <button onClick={() => {setTheme('dark'); localStorage.setItem('theme','dark');}} className={`px-6 py-2 rounded-xl text-sm font-bold border transition-all ${theme === 'dark' ? 'bg-slate-800 text-white border-slate-700 shadow-lg shadow-black/30' : 'glass hover:bg-black/5 dark:hover:bg-white/5 border-transparent'}`}>Karanlık (Dark)</button>
                            </div>
                        </section>
                        <section className="glass p-6 rounded-2xl">
                            <h3 className="text-lg font-bold mb-4 flex items-center"><span className="mr-3">💾</span> Veritabanı ve Yedekleme</h3>
                            <div className="flex flex-col md:flex-row gap-4">
                                <button onClick={handleExport} className="flex-1 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-500 hover:text-white px-6 py-4 rounded-xl font-bold transition-all flex items-center justify-center border border-emerald-500/20"><span className="mr-2">📥</span> Yedeği İndir (Export)</button>
                                <label className="flex-1 bg-amber-500/10 text-amber-600 dark:text-amber-400 hover:bg-amber-500 hover:text-white px-6 py-4 rounded-xl font-bold transition-all flex items-center justify-center cursor-pointer border border-amber-500/20"><span className="mr-2">📤</span> Yedeği Yükle (Import)<input type="file" className="hidden" accept=".db" onChange={handleImport} /></label>
                            </div>
                        </section>
                        <section className="glass p-6 rounded-2xl">
                            <h3 className="text-lg font-bold mb-4 flex items-center text-rose-600 dark:text-rose-400"><span className="mr-3">⚙️</span> Gelişmiş Sunucu Kontrolü</h3>
                            <div className="flex flex-col md:flex-row gap-4">
                                <button onClick={handleUpdateCheck} className="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-6 py-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-500/20">🔄 Güncellemeleri Denetle</button>
                                <button onClick={handleRestart} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white px-6 py-4 rounded-xl font-bold transition-all shadow-lg shadow-rose-500/20">♻️ Sunucuyu Yeniden Başlat</button>
                            </div>
                        </section>
                    </div>
                </div>
            );
        };
        
        
        // --- GLOBAL DIALOG SYSTEM ---
        let globalShowToast = (msg, type = 'info') => {};
        let globalShowConfirm = (msg, onConfirm) => {};

        const SystemDialogs = ({ toast, setToast, confirmDialog, setConfirmDialog }) => {
            return (
                <>
                    {/* Toast */}
                    {toast && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] animate-fade-in">
                            <div className={`glass px-6 py-3 rounded-full shadow-2xl border flex items-center space-x-3 
                                ${toast.type === 'error' ? 'border-rose-500/50 bg-rose-500/10 text-rose-100' : 
                                  toast.type === 'success' ? 'border-emerald-500/50 bg-emerald-500/10 text-emerald-100' :
                                  'border-blue-500/50 bg-blue-500/10 text-blue-100'}`}
                            >
                                <span>{toast.type === 'error' ? '❌' : toast.type === 'success' ? '✅' : 'ℹ️'}</span>
                                <span className="font-semibold text-sm">{toast.msg}</span>
                                <button onClick={() => setToast(null)} className="ml-4 opacity-70 hover:opacity-100">✕</button>
                            </div>
                        </div>
                    )}
                    
                    {/* Confirm Modal */}
                    {confirmDialog && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="glass p-8 rounded-2xl max-w-sm w-full shadow-2xl border border-slate-800/40 mx-4">
                                <h3 className="text-xl font-bold text-white mb-4">⚠️ Onay Bekleniyor</h3>
                                <p className="text-slate-300 text-sm mb-6 leading-relaxed">{confirmDialog.msg}</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setConfirmDialog(null)} className="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-300 hover:bg-white/10 transition-all border-transparent">Vazgeç</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="px-5 py-2.5 rounded-xl text-sm font-bold bg-rose-600 hover:bg-rose-700 text-white shadow-lg shadow-rose-500/30 transition-all">Onayla</button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        };

        const App = () => {
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'dark');
            const [projectConfig, setProjectConfig] = useState(null); // null = yükleniyor
            const [isConfigured, setIsConfigured] = useState(null); // null = bilinmiyor

            const [toast, setToast] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);
            
            React.useEffect(() => {
                globalShowToast = (msg, type = 'info') => {
                    setToast({ msg, type });
                    setTimeout(() => setToast(null), 4000);
                };
                globalShowConfirm = (msg, onConfirm) => setConfirmDialog({ msg, onConfirm });
            }, []);

            // İlk açılışta config kontrolü
            useEffect(() => {
                fetch('/api/v1/config').then(r => r.json()).then(config => {
                    setProjectConfig(config);
                    setIsConfigured(config.is_configured === true);
                }).catch(() => setIsConfigured(false));
            }, []);

            const handleSetupComplete = (config) => {
                setProjectConfig(config);
                setIsConfigured(true);
            };

            const [activeTab, setActiveTab] = useState('dashboard');
            const [stats, setStats] = useState({ units: 0, contacts: 0, cargos: 0, cameras: 0, connectedDevices: 0 });
            const [villas, setVillas] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [cargos, setCargos] = useState([]);
            const [companies, setCompanies] = useState([]);
            const [cameras, setCameras] = useState([]);
            const [intercoms, setIntercoms] = useState([]);
            const [devices, setDevices] = useState([]);
            const [syncActive, setSyncActive] = useState(true);
            const [serverIp, setServerIp] = useState("");

            const fetchData = async () => {
                const endpoints = [
                    { url: '/api/v1/stats', setter: (data) => { setStats(data); if(data.config) setProjectConfig(data.config); } },
                    { url: '/api/v1/villas', setter: setVillas },
                    { url: '/api/v1/contacts', setter: setContacts },
                    { url: '/api/v1/cargos', setter: setCargos },
                    { url: '/api/v1/companies', setter: setCompanies },
                    { url: '/api/v1/cameras', setter: setCameras },
                    { url: '/api/v1/intercoms', setter: setIntercoms },
                    { url: '/api/v1/devices', setter: setDevices },
                    { url: '/api/v1/sync/status', setter: (data) => { setSyncActive(data.active); setServerIp(data.ip || ""); } }
                ];
                const results = await Promise.all(endpoints.map(ep => fetch(ep.url).then(r => r.ok ? r.json() : null)));
                results.forEach((data, i) => { if(data) endpoints[i].setter(data); });
            };

            const toggleSync = async () => {
                try {
                    const res = await fetch('/api/v1/sync/toggle', { method: 'POST' });
                    if(res.ok) {
                        const data = await res.json();
                        setSyncActive(data.active);
                    }
                } catch (e) { globalShowToast("Sunucuyla bağlantı kurulamadı!", "error"); }
            };

            useEffect(() => {
                if (isConfigured) {
                    fetchData();
                    const it = setInterval(fetchData, 4000);
                    return () => clearInterval(it);
                }
            }, [isConfigured]);

            // Yükleme ekranı
            if (isConfigured === null) {
                return (
                    <div className={`flex items-center justify-center h-screen w-screen ${theme}`}>
                        <SystemDialogs toast={toast} setToast={setToast} confirmDialog={confirmDialog} setConfirmDialog={setConfirmDialog} />
                        <div className="text-center animate-fade-in">
                            <div className="text-4xl mb-4">⏳</div>
                            <div className="text-slate-400 text-sm">Sunucu yapılandırması kontrol ediliyor...</div>
                        </div>
                    </div>
                );
            }

            // Kurulum sihirbazı
            if (!isConfigured) {
                return (
                    <div className={`${theme}`}>
                        <SystemDialogs toast={toast} setToast={setToast} confirmDialog={confirmDialog} setConfirmDialog={setConfirmDialog} />
                        <SetupWizard onComplete={handleSetupComplete} />
                    </div>
                );
            }

            // Moda göre dashboard kartlarını oluştur
            const modules = projectConfig?.modules || ['units', 'contacts', 'cargos', 'cameras', 'intercoms'];
            const unitLabel = projectConfig?.unit_label_plural || 'Villalar';
            const unitIcon = projectConfig?.project_type === 'MALL' ? '🏬' : projectConfig?.project_type === 'BLOCK' ? '🏢' : '🏡';
            
            const dashboardCards = [
                { label: unitLabel, val: stats.units, icon: unitIcon, tab: 'villas' },
                { label: 'Kişiler', val: stats.contacts, icon: '👥', tab: 'contacts' },
            ];
            if (modules.includes('cargos')) {
                dashboardCards.push({ label: 'Kargo Trafiği', val: stats.cargos, icon: '📦', tab: 'cargos' });
            }
            dashboardCards.push({ label: 'Cihaz Durumu', val: stats.connectedDevices, icon: '📱', tab: 'logs' });

            return (
                <>
                <SystemDialogs toast={toast} setToast={setToast} confirmDialog={confirmDialog} setConfirmDialog={setConfirmDialog} />
                <div className={`flex h-screen w-screen overflow-hidden ${theme} transition-colors`}>
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} config={projectConfig} />
                    <main className="flex-1 flex flex-col min-w-0 ">
                        <header className="h-16 glass border-b border-slate-800/60 flex items-center justify-between px-8 shrink-0 relative z-50">
                            <div className="text-xl font-bold uppercase tracking-tighter text-slate-800 dark:text-slate-200 font-mono flex items-center">
                                {activeTab === 'villas' ? unitLabel : activeTab}
                                {serverIp && (
                                    <span className="ml-4 px-2 py-0.5 rounded-md bg-slate-800 border border-slate-700 text-slate-400 text-xs tracking-wider flex items-center">
                                        <span className="mr-1">🌐</span> IP: {serverIp}
                                    </span>
                                )}
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="flex items-center space-x-3 bg-black/5 dark:bg-slate-950/50 px-4 py-1.5 rounded-full border border-slate-800/60">
                                    <div className="flex items-center space-x-2">
                                        <div className={`w-2 h-2 rounded-full ${syncActive ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></div>
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">SENKRONİZASYON</span>
                                    </div>
                                    <button 
                                        onClick={toggleSync}
                                        className={`px-3 py-1 rounded-md text-[10px] font-bold transition-all ${syncActive ? 'bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white' : 'bg-emerald-500/10 text-emerald-500 hover:bg-emerald-500 hover:text-white'}`}
                                    >
                                        {syncActive ? 'DURDUR' : 'BAŞLAT'}
                                    </button>
                                </div>
                                <span className="text-[10px] font-bold text-emerald-400 bg-emerald-400/10 px-2.5 py-1 rounded-full border border-emerald-500/20">WEB AKTİF</span>
                            </div>
                        </header>
                        <div className="flex-1 overflow-hidden">
                            {activeTab === 'dashboard' && (
                                <div className={`p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-${dashboardCards.length} gap-6 animate-fade-in h-full overflow-y-auto`}>
                                    {dashboardCards.map(s => (
                                        <div 
                                            key={s.label} 
                                            onClick={() => setActiveTab(s.tab)}
                                            className="glass p-6 rounded-2xl border-t-2 border-slate-700 hover:border-blue-500 hover:bg-slate-800/40 transition-all cursor-pointer group"
                                        >
                                            <div className="text-3xl mb-4 group-hover:scale-110 transition-transform inline-block">{s.icon}</div>
                                            <div className="text-sm text-slate-400 font-medium uppercase tracking-[0.2em]">{s.label}</div>
                                            <div className="text-4xl font-bold mt-2 tracking-tighter">{s.val}</div>
                                            <div className="mt-4 text-[10px] text-blue-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity flex items-center tracking-widest">
                                                DETAYLARA GİT <span className="ml-2">→</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            {activeTab === 'villas' && <VillaPage villas={villas} contacts={contacts} onUpdate={fetchData} />}
                            {activeTab === 'contacts' && <ContactPage contacts={contacts} allVillas={villas} onUpdate={fetchData} />}
                            {activeTab === 'cargos' && modules.includes('cargos') && <CargoPage cargos={cargos} companies={companies} />}
                            {activeTab === 'faults' && <FaultPage cameras={cameras} intercoms={intercoms} />}
                            {activeTab === 'logs' && <LogPage devices={devices} />}
                            {activeTab === 'settings' && <SettingsPage theme={theme} setTheme={setTheme} />}
                        </div>
                    </main>
                </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
